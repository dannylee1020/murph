name: Bug report
description: Report something broken in Murph.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, setup state, or channel/integration context when relevant.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not include secrets, tokens, private messages, or workspace data.
      render: text
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Node version, Murph version or commit"
    validations:
      required: false
