display_information:
  name: Murph Personal
features:
  bot_user:
    display_name: Murph Personal
    always_online: false
oauth_config:
  redirect_urls:
    - http://localhost:5173/api/slack/oauth/callback
  scopes:
    bot:
      - chat:write
      - im:history
settings:
  event_subscriptions:
    bot_events:
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
