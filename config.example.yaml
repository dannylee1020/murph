app:
  url: http://localhost:5173
  sqlitePath: data/murph.sqlite
  memoryPath: ~/.murph/memory
  heartbeatIntervalMs: 900000
  runEventRetentionDays: 30
  contextSourceTimeoutMs: 3000
  contextSourceMaxOptional: 3
  timezone: America/Los_Angeles
  workdayStartHour: 9
  workdayEndHour: 17

ai:
  defaultProvider: openai
  defaultModel: gpt-5.5
  # Optional. Omit agent settings to inherit defaultProvider/defaultModel.
  agent:
    provider: ""
    model: ""

integrations:
  notion:
    version: 2026-03-11
    maxResults: 3
  github:
    repositories: []
  google:
    calendarId: primary
  obsidian:
    vaultPath: ""
  webSearch:
    backend: brave
  localTools:
    fileReadAllowedRoots: []
    shellAllowedCommandsJson: ""

policy:
  profile: ""
  mode: ""
