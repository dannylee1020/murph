<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        try {
          const key = 'murph_theme_preference';
          const allowed = new Set(['auto', 'light', 'dark']);
          const stored = localStorage.getItem(key);
          const preference = allowed.has(stored) ? stored : 'auto';
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme = preference === 'auto'
            ? systemDark ? 'dark' : 'light'
            : preference;
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Murph is a self-hosted control plane for shared-channel async work."
    />
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" />
    <title>Murph</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
